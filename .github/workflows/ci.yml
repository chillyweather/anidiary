name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  build-and-smoke-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Start server
        env:
          SESSION_SECRET: ci-session-secret
          NODE_ENV: test
          PORT: 3000
        run: |
          node server.js > server.log 2>&1 &
          echo $! > server.pid

      - name: Wait for app
        run: |
          for i in {1..20}; do
            if curl -fsS http://127.0.0.1:3000/login > /dev/null; then
              exit 0
            fi
            sleep 1
          done
          echo "Server failed to start"
          exit 1

      - name: Smoke check
        run: |
          curl -fsS http://127.0.0.1:3000/login > /dev/null
          curl -fsS http://127.0.0.1:3000/register > /dev/null

      - name: Stop server
        if: always()
        run: |
          if [ -f server.pid ]; then
            kill "$(cat server.pid)" || true
          fi

      - name: Upload server log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: server-log
          path: server.log
